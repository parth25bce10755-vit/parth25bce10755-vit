<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falcon Off-Road AI Dashboard</title>
    <style>
       
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --download-start: #4facfe;
            --download-end: #00f2fe;
            --bg: #0f0c29;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            margin-top: 40px;
            text-align: center;
            animation: fadeInDown 1s ease-out;
        }

        .dashboard {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 1000px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            margin-top: 30px;
            transition: transform 0.3s ease;
        }

        .upload-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        input[type="file"] {
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border: 1px dashed var(--primary);
            color: white;
            cursor: pointer;
        }

        button {
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        #analyzeBtn {
            background: linear-gradient(to right, var(--primary), var(--secondary));
        }

        #downloadBtn {
            background: linear-gradient(to right, var(--download-start), var(--download-end));
            display: none;
        }

        button:hover:not(:disabled) {
            letter-spacing: 1px;
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .comparison-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .img-box {
            text-align: center;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
        }

        .img-box img {
            width: 100%;
            border-radius: 8px;
            display: none;
        }

        #loadingBar {
            display: none;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
            border-radius: 2px;
        }

        #loadingBar::after {
            content: "";
            position: absolute;
            left: -50%;
            width: 50%;
            height: 100%;
            background: var(--primary);
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { left: -50%; }
            100% { left: 100%; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
            font-size: 0.8em;
        }

        .chip {
            padding: 5px 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <header>
        <h1>🦅 FALCON AI</h1>
        <p>Advanced Off-Road Terrain Segmentation</p>
    </header>

    <div class="dashboard">
        <div class="upload-controls">
            <input type="file" id="imageLoader" accept="image/*">
            <button id="analyzeBtn">Run Analysis</button>
            <button id="downloadBtn">Download Report</button>
        </div>

        <div id="loadingBar"></div>

        <div class="comparison-container">
            <div class="img-box">
                <h4>Original Input</h4>
                <img id="originalImg" src="" alt="Input">
            </div>
            <div class="img-box">
                <h4>Segmentation Mask</h4>
                <img id="outputImg" src="" alt="Output">
            </div>
        </div>

        <div class="legend">
    <span class="chip" style="border-left: 4px solid #00FF00;">Trees</span>
    <span class="chip" style="border-left: 4px solid #808080;">Rocks</span>
    <span class="chip" style="border-left: 4px solid #228B22;">Shrubs</span>
    <span class="chip" style="border-left: 4px solid #BDB76B;">Grass</span>
    <span class="chip" style="border-left: 4px solid #87CEEB;">Sky</span>
</div>
    </div>

    <script>
        const imageLoader = document.getElementById('imageLoader');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const originalImg = document.getElementById('originalImg');
        const outputImg = document.getElementById('outputImg');
        const loadingBar = document.getElementById('loadingBar');

        // Handle Image Selection and Preview
        imageLoader.onchange = function() {
            const file = imageLoader.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    originalImg.src = e.target.result;
                    originalImg.style.display = 'block';
                    outputImg.style.display = 'none';
                    downloadBtn.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        };

       
        analyzeBtn.onclick = async function() {
            if (!imageLoader.files[0]) return alert("Please select an image first!");

            loadingBar.style.display = 'block';
            analyzeBtn.disabled = true;

            const file = imageLoader.files[0];
            const reader = new FileReader();
            
            reader.onloadend = async function() {
                const base64Image = reader.result;

                try {
                   
                    const response = await fetch('http://127.0.0.1:5000/predict', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: base64Image })
                    });

                    if (!response.ok) throw new Error("Server response was not OK");

                    const data = await response.json();

                    if (data.mask) {
                        outputImg.src = data.mask;
                        outputImg.style.display = 'block';
                        downloadBtn.style.display = 'inline-block';
                    } else if (data.error) {
                        alert("AI Error: " + data.error);
                    }
                } catch (e) {
                    console.error("Connection Error:", e);
                    alert("Cannot connect to AI Server. Ensure server.py is running!");
                } finally {
                    loadingBar.style.display = 'none';
                    analyzeBtn.disabled = false;
                }
            };
            
            reader.readAsDataURL(file);
        };

       
        downloadBtn.onclick = function() {
            const link = document.createElement('a');
            link.href = outputImg.src;
            link.download = 'Falcon_Terrain_Analysis.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
    </script>
</body>

</html>
